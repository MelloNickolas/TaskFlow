<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TaskFlow — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="login.css"/>
</head>
<body>

<canvas id="stars-canvas"></canvas>

<div class="nebula nebula-1"></div>
<div class="nebula nebula-2"></div>
<div class="nebula nebula-3"></div>

<div class="page">

  <!-- LEFT PANEL -->
  <div class="left-panel">
    <div class="orbit-ring ring-1"></div>
    <div class="orbit-ring ring-2"></div>

    <div class="logo-wrap">
      <img src="./imgs/Logo-White.png" alt="TaskFlow Logo"/>
    </div>

    <p class="tagline">Gerencie além do horizonte</p>

    <h1 class="hero-text">Organize o futuro,<br/>uma tarefa por vez.</h1>

    <p class="hero-sub">
      Acompanhe projetos, colabore com sua equipe e entregue resultados — com velocidade espacial.
    </p>
  </div> 

  <!-- DIVIDER -->
  <div class="divider"></div>

  <!-- RIGHT PANEL -->
  <div class="right-panel">
    <div class="card">
      <h2 class="card-title">Bem-vindo de volta</h2>
      <p class="card-sub">Entre na sua conta para continuar</p>

      <!-- EMAIL -->
      <div class="form-group">
        <label for="email">E-mail</label>
        <div class="input-wrap">
          <span class="input-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="2" y="4" width="20" height="16" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/>
            </svg>
          </span>
          <input type="email" id="email" placeholder="seu@email.com"/>
        </div>
      </div>

      <!-- SENHA -->
      <div class="form-group">
        <label for="senha">Senha</label>
        <div class="input-wrap">
          <span class="input-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
          </span>
          <input type="password" id="senha" placeholder="••••••••"/>
        </div>
      </div>

      <div class="forgot-row">
        <a href="#">Esqueceu a senha?</a>
      </div>

      <button class="btn-primary">Entrar</button>
    </div>
  </div>

</div>

<script>
  // ── STAR FIELD ──
  const canvas = document.getElementById('stars-canvas');
  const ctx    = canvas.getContext('2d');
  let W, H, stars = [];

  function resize() {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
  }

  function mkStar() {
    return {
      x: Math.random() * W,
      y: Math.random() * H,
      r: Math.random() * 1.4 + .2,
      a: Math.random(),
      speed: Math.random() * .004 + .001,
      phase: Math.random() * Math.PI * 2
    };
  }

  function initStars(n = 220) {
    stars = Array.from({ length: n }, mkStar);
  }

  function drawStars(t) {
    ctx.clearRect(0, 0, W, H);
    stars.forEach(s => {
      const alpha = .3 + .7 * (0.5 + 0.5 * Math.sin(s.phase + t * s.speed));
      ctx.beginPath();
      ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
      ctx.fillStyle = `rgba(200,170,255,${alpha * s.a})`;
      ctx.fill();
    });
    requestAnimationFrame(drawStars);
  }

  resize();
  initStars();
  requestAnimationFrame(drawStars);
  window.addEventListener('resize', () => { resize(); initStars(); });
</script>
</body>
</html>
